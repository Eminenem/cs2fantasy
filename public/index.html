<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Fantasy League</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/login.html';
        }
    </script>
</head>
<body>
    <div id="site-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f4f5f7; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.5s; background-image: radial-gradient(circle at center, #ffffff 0%, #f4f5f7 100%);">

        <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.15; pointer-events: none; background-image: linear-gradient(30deg, transparent 49.5%, #c5b59f 50%, transparent 50.5%), linear-gradient(-30deg, transparent 49.5%, #7e8494 50%, transparent 50.5%); background-size: 160px 276px; z-index: 1;"></div>

        <div style="position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center;">
            <div style="font-family: 'Oswald', 'Arial Black', sans-serif; font-weight: 800; font-size: 30px; color: #111217; letter-spacing: 3px; margin-bottom: 20px; text-transform: uppercase; font-style: italic;">
                CS2 <span style="color: #c5b59f;">FANTASY</span>
            </div>

            <div style="width: 200px; height: 3px; background: rgba(18, 19, 24, 0.05); border-radius: 2px; overflow: hidden; position: relative; border: 1px solid rgba(18, 19, 24, 0.02);">
                <div style="width: 70px; height: 100%; background: linear-gradient(90deg, #fbf7eb, #c5b59f); position: absolute; border-radius: 2px; animation: loadingBar 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; box-shadow: 0 0 8px rgba(197, 181, 159, 0.4);"></div>
            </div>

            <p style="color: #7e8494; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 18px; font-weight: 700; font-family: 'Share Tech Mono', monospace;">Пожалуйста подождите...</p>
        </div>
    </div>


    <style>
        @keyframes loadingBar {
            0% {
                left: -80px;
            }

            50% {
                left: 200px;
            }

            100% {
                left: 200px;
            }
        }
    </style>
    <header class="header">
        <div class="container header__container" style="position: relative;">
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <h1 class="header__title">CS2 <span style="color: rgba(200,200,200,0.85)">Fantasy</span></h1>
                <div id="user-display-name" style="color: var(--color-text-muted); font-size: 11px; font-family: 'Share Tech Mono', monospace; text-transform: uppercase;">
                    Аккаунт: <span style="color: #ffffff; font-weight: bold;" id="current-username">Загрузка...</span>
                </div>
            </div>

            <div class="stats-bar-wrapper" id="mobile-stats-wrapper">
                <div class="stats-bar">
                    <div class="stats-bar__item_none" id="countdown-timer" style="color: var(--color-primary); letter-spacing: 0.5px;">
                        До закрытия составов: --:--:--
                    </div>
                    <div class="stats-bar__item">Ваши очки: <span style="margin-left:5px !important;" id="score">0</span></div>

                    <div class="stats-bar__item" style="background: rgba(255, 74, 74, 0.1); border-color: rgba(255, 74, 74, 0.2); padding: 0; overflow: hidden; display: flex; ">
                        <button onclick="openHistoryModal()" style="background: none; border: none; color: var(--color-primary); font-weight: bold; width: 100%; height: 100%; padding: 10px 18px; cursor: pointer; text-transform: uppercase; font-size: 13px; font-family: 'Oswald', sans-serif;">
                            История туров
                        </button>
                    </div>

                    <div class="stats-bar__item" style="background: var(--color-primary); padding: 0; overflow: hidden; display: flex;">
                        <a href="/leaderboard.html" style="color: var(--color-primary); font-weight: bold; text-decoration: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 10px 20px; box-sizing: border-box;">
                            Таблица лидеров
                        </a>
                    </div>

                    <div class="stats-bar__item" style="background: rgba(255, 74, 74, 0.1); border-color: rgba(255, 74, 74, 0.2); padding: 0; overflow: hidden; display: flex;">
                        <button onclick="logout()" style="background: none; border: none; color: var(--color-primary); font-weight: bold; width: 100%; height: 100%; padding: 10px 18px; cursor: pointer; text-transform: uppercase; font-size: 13px; font-family: 'Oswald', sans-serif;">
                            Выйти
                        </button>
                    </div>
                </div>
            </div>

            <button id="toggle-stats-btn" style="display: none; background: rgba(55, 55, 60, 1); border: 1px solid rgba(225, 225, 245, 0.15); color: var(--color-primary); border-radius: 50%; width: 32px; height: 32px; font-weight: bold; font-size: 16px; cursor: pointer; position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%); z-index: 110; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); outline: none;">
                ▲
            </button>
        </div>
    </header>

    <div class="ticker-wrapper">
        <div class="ticker__title">HLTV TOP 20</div>
        <div class="ticker" id="ranking-list">
        </div>
    </div>

    <main class="main container">
        <section class="fantasy-team">
            <h2 class="section-title" style="gap:0px !important;"><span style="margin-right: 6px !important;">Ваша </span> команда (<span id="team-count">0</span>/5)</h2>
            <div class="team-slots" id="team-slots">
            </div>
        </section>

        <section class="market">
            <h2 class="section-title"><span>Доступные</span> игроки</h2>
            <div class="market-grid" id="market-grid">
            </div>
        </section>
    </main>
    <div id="history-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);">
        <div class="admin-layout" style="max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; position: relative; background: #ffffff; padding: 30px; border-radius: 12px;">
            <button onclick="closeHistoryModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 22px; cursor: pointer; color: #111217; font-weight: bold;">&times;</button>

            <h2 class="section-title" style="margin-bottom: 20px; border-left-color: var(--color-surface-dark);"><span>Архив</span> ваших составов</h2>

            <div id="history-content">
                <p style="text-align: center; color: var(--color-text-muted);">Загрузка истории...</p>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
