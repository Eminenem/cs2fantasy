<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Fantasy League</title>
    <link rel="stylesheet" href="style.css">
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/login.html';
        }
    </script>
</head>
<body>
    <div id="site-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f14; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s;">
        <div style="font-family: 'Impact', sans-serif; font-style: italic; font-size: 36px; color: #fff; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase;">
            CS2 <span style="color: #de9b35;">Fantasy</span>
        </div>
        <!-- Анимированная линия загрузки в стиле киберспортивных трансляций -->
        <div style="width: 200px; height: 3px; background: rgba(255,255,245,0.05); border-radius: 2px; overflow: hidden; position: relative;">
            <div style="width: 80px; height: 100%; background: #de9b35; position: absolute; border-radius: 2px; animation: loadingBar 1.5s ease-in-out infinite;"></div>
        </div>
        <p style="color: rgba(150,150,165,1); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-top: 15px; font-weight: bold;">Подключение к серверам лиги...</p>
    </div>

    <style>
        @keyframes loadingBar {
            0% {
                left: -80px;
            }

            50% {
                left: 200px;
            }

            100% {
                left: 200px;
            }
        }
    </style>
    <header class="header">
        <div class="container header__container" style="position: relative;">
            <h1 class="header__title">CS2 <span style="color: rgba(200,200,200,0.85)">Fantasy</span></h1>

            <!-- 🔥 ДОБАВЛЕНО: Обертка для плавного сворачивания всей панели статистики -->
            <div class="stats-bar-wrapper" id="mobile-stats-wrapper">
                <div class="stats-bar">
                    <div class="stats-bar__item" id="countdown-timer" style="background: rgba(222, 155, 53, 0.1); color: var(--color-primary); letter-spacing: 0.5px;">
                        До закрытия: --:--:--
                    </div>
                    <div class="stats-bar__item">Ваши очки: <span style="margin-left:5px !important;"id="score">0</span></div>
                    <!-- Кнопка перехода на страницу рейтинга предсказателей -->
                    <div class="stats-bar__item" style="background: var(--color-primary); padding: 0; overflow: hidden; display: flex;">
                        <a href="/leaderboard.html" style="color: #000; font-weight: bold; text-decoration: none; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 10px 20px; box-sizing: border-box;">
                            Таблица лидеров
                        </a>
                    </div>
                </div>
            </div>

            <!-- 🔥 ДОБАВЛЕНО: Кнопка-стрелочка. Появляется только на мобильных (управляется через style.css) -->
            <button id="toggle-stats-btn" style="display: none; background: rgba(55, 55, 60, 1); border: 1px solid rgba(225, 225, 245, 0.15); color: var(--color-primary); border-radius: 50%; width: 32px; height: 32px; font-weight: bold; font-size: 16px; cursor: pointer; position: absolute; bottom: -36px; left: 50%; transform: translateX(-50%); z-index: 110; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.5); outline: none;">
                ▲
            </button>
        </div>
    </header>

    <!-- НОВЫЙ БЛОК: Бегущая строка рейтинга HLTV -->
    <div class="ticker-wrapper">
        <div class="ticker__title">HLTV TOP 20</div>
        <div class="ticker" id="ranking-list">
            <!-- Карточки команд дублируются внутри JS для бесконечной ленты -->
        </div>
    </div>

    <!-- Возвращаем стандартную чистую сетку без боковой панели -->
    <main class="main container">
        <!-- Сетка собранной команды -->
        <section class="fantasy-team">
            <h2 class="section-title">Ваша команда (<span id="team-count">0</span>/5)</h2>
            <div class="team-slots" id="team-slots">
                <!-- Слоты генерируются через JS -->
            </div>
        </section>

        <!-- Рынок доступных игроков -->
        <section class="market">
            <h2 class="section-title">Доступные игроки</h2>
            <div class="market-grid" id="market-grid">
                <!-- Карточки генерируются через JS -->
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
